body:
  text: 卷四咳嗽論曰古書有咳而無嗽後人以咳嗽兼言之者蓋其聲響亮不因痰涎而發謂之咳痰涎上下隨聲而發謂之嗽如水之漱蕩能漱其氣也諸咳之原其來雖各不同其氣必至於肺而後發若非其時感邪而發咳者固因臟氣虛弱抑或五行之氣內相剋制病作即治無使傳注不即治之傳注他臟遂至不起然有因寒者因風者因熱者風寒從外至熱則從內起風寒則諸經自受其邪熱則臟腑熏蒸乘而為病風則散之寒則溫之熱則調之瀉之因風者惡風出風中則咳甚因寒者遇寒則劇因熱者得熱則發若因外感風寒不即治之邪氣留淫日深攻傷臟氣一臟受極遂傳其所不勝如肺經受病久而不去咳則右脅痛不可轉側遂傳之肝肝屬木肺屬金金剋木咳引左脅不可臥臥則咳劇遂傳之脾脾土也為木來克則大便鴨溏甚則瘛瘲如癇狀次傳之腎腎屬水為土所克則骨痿不能起於床手足浮腫次傳之心則死若因臟氣自相熏蒸如心乘於肺急補肺而瀉心補肺宜辛甘瀉心宜苦若脾熱熏蒸但瀉其脾治以甘平調肺以辛溫謂之間傳學宜知此若肺咳惡風脈浮小青龍湯主之惡寒脈緊杏子湯主之微弱者鍾乳丸主之惡熱喉燥脈數甚則咯血天門冬湯杏子湯主之孫氏仁存活法祕方肺咳之狀喘息有音甚則咯血小青龍湯見前寒證門杏子湯杏仁去皮尖乾薑細辛去苗甘草炙各半兩五味子桂心各一兩上為散每服五錢水二盞棗一個同煎至一盞去滓溫服痰多者加半夏半兩湯洗七遍鍾乳丸鍾乳銀石器內煮一時研一伏時一兩紫菀去苗及枯燥者半兩桑白皮一分銼微炒款冬花黃耆各半兩上為細末煉蜜和丸如梧桐子大飲下三十丸食前服天門冬湯天門冬去心紫菀去苗及枯燥者焙知母焙各一兩桑白皮五味子桔梗各半兩上為散每服五錢水二盞煎至一盞去滓溫服咳血者阿膠半兩炒燥大便澀而喘加葶藶半兩若心咳脈浮惡風桂心湯主之惡寒時口噤脈緊大附子細辛湯主之惡熱脈疾小便赤澀茯苓湯主之桂心湯孫氏仁存活法祕方云心咳之狀上引心痛喉介介然如梗甚則咽喉腫痛脈浮惡風宜桂心湯人參桂取心白茯苓各一兩麻黃貝母炒各半兩遠志去心甘草炙各一分上為散每服五錢水二盞煎至一盞去滓溫服附子細辛湯附子炮去皮臍細辛去苗各半兩人參菖蒲各一兩甘草炙半兩五味子二兩上為散每服五錢水二盞煎至一盞去滓溫服茯苓湯茯苓麥門冬去心黃芩各一兩秦艽去土柴胡去苗各半兩杏仁去皮尖一分上為散每服五錢水二盞煎至一盞去滓溫服若肝咳惡風脈浮弦射干湯主之孫氏仁存活法祕方云肝咳之狀咳則兩脅痛甚則不可轉側轉側兩脅下滿惡寒脈浮緊五味子煎主之惡熱脈疾目赤頭眩百部丸主之射干湯射干麻黃去根節各半兩五味子半夏湯泡七遍各一兩款冬花二兩上為散每服五錢水二盞姜五片同煎至一盞去滓溫服五味子煎五味子五兩桂取心一兩川烏頭炮去皮臍一兩上為末水五升煎至一升絞取汁用好蜜二兩再熬成膏溫酒化彈子大食前服百部丸百部八兩為細末生地黃五斤取汁熬成膏上將地黃膏和百部為丸如梧桐子大飲下三十粒食後服若脾咳惡風脈浮緩麻黃厚朴湯主之孫氏仁存活法祕方云脾咳之狀咳則右脅下痛引肩背痛甚則不可以動動則咳劇口中如含霜雪中脘隱隱冷惡寒脈緊弱溫中丸主之大便堅從腹上至頭髮熱脈疾茯苓丸主之麻黃厚朴湯厚朴去皮薑汁塗炙麻黃去根節杏仁去皮尖橘皮洗各一兩甘草炙半夏湯洗七遍各半兩上為散每服五錢水二盞姜五片同煎至一盞去滓溫服溫中丸乾薑半夏湯洗七遍各一兩白朮二兩細辛去苗胡椒各半兩上為細末煉蜜和丸如梧桐子大米飲下三十粒食前服茯苓丸茯苓黃芩各一兩五味子半兩半夏湯洗七遍切薑汁浸焙半兩橘皮洗一兩桔梗半兩上為細末煉蜜和丸如梧桐子大米飲下三十粒食後服若腎咳惡風脈浮白前湯主之孫氏仁存活法祕方云腎咳之狀咳則腰背相引疼痛惡寒唾冷沫小便數脈緊椒紅丸主之惡熱骨間煩疼地骨皮湯主之白前湯白前細辛去苗川芎五味子各一兩麻黃去根節芍藥桂取心各半兩上為散每服五錢水二盞煎至一盞去滓溫服椒紅丸椒去目炒出汗半兩款冬花紫菀去苗及枯燥者乾薑各一兩礬石火煅一伏時附子炮去皮臍細辛去苗皂莢去子酥炙各半兩上為細末煉蜜和丸如梧桐子大米飲下三十粒食前服地骨皮湯地骨皮百部各二兩芍藥赤茯苓各一兩上為散每服五錢水二盞竹葉十片同煎至一盞去滓食後溫服若顴骨赤大如錢日晡發熱者死若潮熱有時五心煩熱搏於營衛不咳者易治脈促澀者難治青蒿煎柴胡芍藥湯主之青蒿煎青蒿汁一升人參麥門冬去心各一兩上將二味為末用青蒿汁同熬成膏丸如梧桐子大飲下二十粒食後服柴胡芍藥湯柴胡去苗芍藥各一兩地骨皮石膏各半兩上為散每服五錢水二盞小麥五十粒同煎至一盞去滓食後溫服若但嗜臥飲食不榮肌膚或不能食心腹虛脹滑泄背膂牽急勞倦不能動止或因大病後或因下利後不復常得之於脾脈弦大者不治四肢煎厥亦謂之肉極炙肝散白朮丸主之炙肝散見前氣證門白朮丸白朮橘皮洗各一兩厚朴去皮薑汁塗炙焦人參各半兩上為細末煉蜜和丸如梧桐子大米飲下三十丸若咳嗽如膿涕或微喘急短氣脅下痛皮膚乾燥動則咳極由形寒飲冷傷於肺經久嗽不已則肺枯燥令人先寒後熱脈弱者可治或緊或弦者不可治喘證論曰凡人一呼一吸謂之息呼出心肺吸入腎肝呼吸之間脾受其氣則營衛行陽二十五度行陰亦二十五度而周身之氣無過不及若藏氣乘並則榮衛不能循常氣過周身失度不能隨陰陽出入以成息故促迫而喘諸氣並上於肺肺管隘則氣爭而喘也其始或因墜墮恐懼恐則精卻精卻則上焦閉而氣不行氣不行則留於肝肝乘於肺此喘出於肝也或因驚恐驚則心無所倚神無所歸氣亂而氣乘於肺此喘出於心也或因渡水跌僕腎氣暴傷腎氣乘肺此喘出於腎也或因飽食過傷動作用力穀氣不流行脾氣逆而乘肺此喘出於脾也團參散主之若喘而發熱頸脈皆動日漸瘦削由客熱乘肺或因飲食失宜氣不轉而氣急誤服熱藥火氣熏肺而遂喘頰赤咽燥其脈細數治屬骨蒸小建中湯天門冬湯主之團參散人參一兩桑白皮銼炒二兩大腹皮銼炒一兩麥門冬去心一兩橘皮洗一兩吳茱萸炒檳榔銼炒芫花炒附子炮去皮臍澤瀉各半兩半夏曲兩訶子炮去核半兩杏仁去皮尖研桂心各一兩枳實麩炒去瓤半兩白朮半兩上為細末薑汁煮糊為丸如梧桐子大米飲下二十粒食前服小建中湯芍藥六兩桂心三兩甘草炙二兩上為散每服五錢水二盞生薑三片棗二個同煎至一盞去滓溫服天門冬湯天門冬去心一兩馬兜鈴百部各半兩上為散每服五錢水二盞煎至一盞去滓溫服若喘嗽時血出四肢懈怠脈浮大而沉由腎氣上並於胃氣道壅塞血無所行而散溢於脾精不化上不勝下脾之絡脈外絶去胃外歸陽明白朮丸主之白朮丸麥門冬去心人參茯苓白朮澤瀉生地黃焙大豆卷各一兩桑白皮炒二兩上為細末煉蜜和丸如梧桐子大米飲下三十粒食前服若病人不臥臥而有所不安則喘者臟有所傷精有所寄故不得臥而喘肺氣盛脈滿大也牡蠣散主之牡蠣散用左顧牡蠣文片色白正者二兩先杵為粗末以乾鍋子盛火燒通赤放冷研為細末每服一錢濃煎鯽魚湯調下不拘時鯽魚重四兩者一個去鱗肚濃煎煎時不許動若咳嗽逆倚息喘急鼻張其人不得仰咽中作水雞聲時發時止由驚憂之氣蓄而不散肺氣鬱或因過飽勞傷氣上行而不能出於肺復遇寒邪肺寒則諸氣收聚氣緩則息有所觸則發經久則不能治杏子散主之及灸腎腧百壯杏子散杏仁去皮尖麩炒黃色研成膏麻黃為末等分上研和煎橘皮湯調二錢匕玉腋散人參川芎茯苓桂心各一兩馬兜鈴半兩知母貝母炒杏仁去皮尖葶藶炒半夏曲各一兩柴胡去淨苗一兩石膏炒研訶子炮各二兩橘皮洗一兩半麻黃去根節一兩白朮一兩半甘草炙羌活各半兩上為細末每服三錢水一盞半生薑三片棗一個煎至一盞去滓食前溫服若喘息肺鳴而痿蹶由有所失亡所求不得氣鬱而肺熱葉焦上舉是謂肺痿阿膠丸主之阿膠丸天門冬去心桔梗生乾地黃焙阿膠銼炒燥桑白皮銼炒麥冬去心柏子仁炒研各半兩甘草炙一分上為末煉蜜和丸如彈子大每服一丸水一盞煎至七分食後溫服嘔吐論曰嘔吐者由清濁不分中焦氣痞若心下牢大如杯或時寒時熱朝食則暮吐暮食則朝吐關脈弦緊弦則為虛緊則為寒虛寒相搏此名為格與關格同也是謂反胃青金丹朴附丸主之青金丹硫黃水銀木香末上將硫黃水銀二味同研令不見水銀星子為度合木香再研用生薑汁煮糊為丸如梧桐子大米飲下三粒食後服朴附丸厚朴去皮銼作小塊子附子炮去皮臍銼作小塊子各一兩生薑八兩去皮取汁上將二味以薑汁同煮盡汁為度焙乾為末酒煮和丸如梧桐子大米飲下三粒食前服若心中溫溫常欲嘔聞食吐酸由宿寒在胃不能運水穀中腕成痰其關弦脈小而短白朮丸大半夏湯主之白朮丸白朮三兩半夏湯洗七遍二兩橘皮洗乾薑各三兩丁香一兩上為細末薑汁煮糊為丸如梧桐子大薑湯下三十丸食前服史氏指南方無橘皮大半夏湯半夏一升人參一兩白蜜上為末每服三錢水一盞煎至半盞加白蜜少許食前服若心上汪洋嘈煩頭目時痛胸中不利或嘔膽汁大便或利或祕喜渴此中脘伏痰旋覆丸主之旋覆花丸見前熱證門若心下虛滿不入飲食時時欲嘔嘔無所出惙惙短氣由他病瘥後復為寒邪傷氣氣寒則不能食胃無穀氣以養其脈微弱大藿香散主之大藿香散藿香葉人參茯苓桔梗木香桂取心白朮各半兩半夏湯洗七遍為末半兩薑汁和成餅子陰乾枇杷葉十片刷去毛上為末每服三大錢水一盞炒薑絲一分與藥同煎至七分去滓食前溫服劉孟容瑣碎録名藿香湯若心下煩不喜熱物得熱即嘔喜渴由胃受邪熱胃熱則氣濁陰陽渾亂其脈虛數或細而疾竹茹湯主之竹茹湯竹茹橘皮甘草半夏赤茯苓麥冬人參枇杷葉上加薑棗煎胃寒去竹茹麥冬加丁香實火去人參若心下悶亂嘔吐不止臥起不安手足躁擾水漿不下由冷熱不和邪正相干清濁不分陰陽錯亂喜冷者因熱惡冷者因寒名曰霍亂其脈弦大者寒也大理中湯半硫丸主之其脈數疾者熱也小藿香散青金散主之大理中湯方缺半硫丸半夏湯洗七遍焙為末硫黃研等分上研細生薑汁煮糊為丸米飲下三十丸小藿香散丁香枇杷葉去毛乾葛赤茯苓藿香葉甘草各等分上為末每服三錢水一盞生薑三片同煎至一盞去滓溫服青金散方缺若卒然嘔吐胸中痞悶氣不下行由飲食過傷胸氣滯而不轉胃中為濁逆行則吐其脈沉疾金汁丸主之金汁丸方缺若痛而嘔者此寒氣客於腸胃腸胃得寒則聚沫聚沫則痛痛則氣逆逆則津液反出而嘔其脈緊細而滑粳米湯主之粳米湯附子炮去皮臍切片子半兩半夏湯浸七遍切片子二兩半甘草炙銼碎一兩陳粳米二兩半上拌和分作十二服每服用水三盞姜十片同煎至一盞去滓溫服若因嘔而噦者吳茱萸丸主之吳茱萸丸吳茱萸炒一兩橘皮洗二兩附子炮去皮臍半兩上為細末白麵糊為丸如梧桐子大飲下二十粒食前服小便附大便論曰小腸為受盛之腑傳導水液若始覺小便微澀赤黃漸漸不通小腹膨脝由心經蘊熱傳於小腸小腸熱則滲於脬中脬闢而系轉診心脈大而牢用蒻葉散或石葦湯主之蒻葉散裹茶蒻葉一兩燒灰滑石半兩研上為細末沸湯浸服或小便暴不通點好茶一杯入生油三兩點飲之石葦湯石葦去毛銼車前子銼車前葉亦可等分上濃煮汁飲之若腹脹溺溲不得好臥屈膝陰縮腫此厥陰之厥加赤茯苓黃芩分兩如前若卒暴小便不通臍腹膨急氣上衝心悶絶欲死由忍尿勞役或從驚恐氣無所伸乘並膀胱氣衝脬系不正診其脈右手急大蔥白湯蔥白湯橘皮洗三兩切葵子一兩蔥白三莖切上以水五升煮取二升分三服固脬丸茴香炒一兩桑螵蛸炒半兩菟絲子揀淨酒浸一宿乘潤搗爛焙乾二兩戎鹽炒一分附子炮去皮臍半兩上為細末煮糊為丸如梧桐子大飲下三十粒空心服若小便純血血下則凝亦無痛處惙惙短氣由陽氣不固陰無所守五液注下其脈散澀欲絶而身冷者死蓯蓉丸主之蓯蓉丸史載之指南方治虛勞溺血加桑螵蛸半兩炙焦酒糊為丸鹽湯下菟絲子揀淨酒浸一宿乘潤搗爛再焙肉蓯蓉洗切焙鹿茸去毛截片酥炙乾地黃等分上為細末煮糊為丸如梧桐子大飲下三十粒空心服若大腸為傳導之官變化出焉如大便不通者津液燥也慎無以烈藥宜紫蘇丸主之紫蘇丸紫蘇子去皮研橘皮洗各二兩知母一兩上為末用生薑汁調成稀膏於重湯上煮不住手攪候可丸如梧桐子大蜜湯下三十粒婦人科四物加桂湯治忽然寒熱川芎當歸洗焙芍藥地黃焙桂心等分上為散每服五錢水二盞煎至一盞去滓溫服史載之指南方內無川芎葶藶丸治先因小便不利後身面浮腫致經血不行此水乘於血名曰水分甜葶藶炒續隨子去皮研各半兩干筍一兩上為細末熟棗肉和丸如梧桐子大煎扁竹湯下七粒如大便利者減葶藶續隨子各一分加白朮半兩食後服牡丹丸治經候時行時止或淋漓不斷腹中時痛其脈沉澀由寒熱邪氣客於胞中留而為血滯當有所去乃愈大黃蒸附子炮去皮臍茯苓牡蒙牡丹皮桔梗各二兩芎藭人參厚朴去皮薑汁塗炙當歸焙各半兩甜葶藶炒各二兩椒去目炒出汗半兩虻蟲去頭足翅五十個吳茱萸炒柴胡去苗乾薑桂去心各半兩細辛去苗兩半上為細末煉蜜和丸如梧桐子大酒下十粒未知加至二十粒食後服小薊湯治經候過多遂至崩漏色鮮明如水下得溫則煩至於昏悶其脈數疾微小為順大者逆由陰虛陽搏為熱所乘傷於衝任血得熱則流散衝任不能收也小薊莖葉洗切研服汁一盞生地黃汁一盞白朮半兩細銼上以水一盞同煎取一半去滓分二服人參白朮散治婦人經候不來身如病而無病脈滑大而六位俱勻謂之陰搏陽有子也精神如故惡聞食臭但嗜一物或大吐時吐清水此名惡阻毋作他病治之白朮一兩人參半兩丁香甘草炙各一分上為末每服三錢水一盞生薑三片同煎至七分去滓食前溫服秦艽散治胎動不安秦艽阿膠炒艾葉等分上為散每服五錢水二盞糯米百粒同煎至一盞去滓溫服白朮散治妊娠面目腫如水狀橘皮洗大腹皮茯苓生薑各半兩白朮一兩上為末飲調方寸匕食前服兔血散治難産最要臨産服之臘兔血上用蒸餅切片子蘸血陰乾為末煎乳香湯調服二錢半夏散治胎死腹中其母面赤舌青者是半夏湯洗七遍薄切片薑汁浸三日炒乾上為末溫酒調下一錢不能酒用湯亦治橫生逆産桃仁湯治惡露頓絶或漸少腰重痛下注兩股刺痛如錐刀刺此留血於經絡不即通之大有痛處必作癰腫蘇木地黃桃仁去皮尖炒各半兩虻蟲去頭足翅炒水蛭炒各三十枚上為散每服五錢水二盞煎至一盞去滓溫服惡露行即住服五香湯治同前木香丁香沉香乳香麝香升麻獨活連翹桑寄生木通各二兩大黃一兩上為散每服五錢水二盞煎至一盞去滓食後溫服沒藥丸治惡露方行忽然斷絶驟作寒熱臍腹大痛胸中如以針刺此大有蓄血留於經絡當歸焙一兩桂心芍藥各半兩沒藥一分桃仁去皮尖炒一分虻蟲去頭足翅炒水蛭炒各三十枚上為細末醋糊丸如梧桐子大醋湯下三丸皂角散治乳婦吹奶由哺兒時鼻氣衝乳中忽然腫硬痛急手揉服皂角散栝蔞散及敷藥不即治之結癰膿能殺人皂角燒細研蛤粉研等分上研細熱酒調一匙或半錢急以手揉之取軟為度瓜子湯治腸頭如以針刺連穀道又因痔痛小便如淋狀時寒時熱此由産時用力氣並腸間亦由陰虛邪熱乘客留聚腸間熱結恐成腸癰袁當時大方云崔左丞屢用有效薏苡仁炒四兩桃仁去皮尖牡丹皮各三兩瓜子一兩上為末每服五錢水二盞煎至一盞去滓溫服皇清嘉慶十有三年歲在著雍執徐陽月照文張海鵬較梓
