body:
  text: 卷一脈論論曰人以天地之氣生四時之法成是以有五臟六腑四肢十二經三百六十五穴以象五運六氣四時十二月周天之度陰陽變化與天地同流乖其氣逆其理則陰陽交錯腑臟偏毗脈行遲速榮衛失度百病從生非脈無以探賾索隱所謂脈者乃天真之元氣有生之精神精神去幹脈理乃絕故上古聖人體性鑑形剖別臟腑詳辨經絡會通內外各著其情氣穴所發各有腧名善診脈者靜意視義觀其變於冥冥之中以神合神悠然獨悟口弗能言先別陰陽審清濁而知分部視喘息聽音聲而知病所生所謂陰陽者至者為陽謂隨呼而出也去者為陰謂隨吸而入也動者為陽鼓擊躁急也靜者為陰來去沉沉默默也數者為陽謂一呼一吸六至也遲者為陰謂往來不滿三至也於三部九候之內察其脈形有獨異者謂獨大獨小獨疾獨遲獨不應四時者乃受病之所也辨五臟六腑部位脈法左手寸口脈浮取之屬小腸為腑沉取之屬心為臟其經則手太陽少陰左手關上脈浮取之屬膽為腑沉取之屬肝為臟其經則足少陽厥陰左手尺中脈浮取之屬膀胱為腑沉取之屬腎為臟其經則足太陽少陰右手寸口脈浮取之屬大腸為腑沉取之屬肺為臟其經則手太陰陽明右手關上脈浮取之屬胃為腑沉取之屬脾為臟其經則足太陰陽明右手尺中脈浮取之屬三焦為腑沉取之屬心包絡又屬右腎其經則手少陽厥陰辨人迎三部趺陽九候五臟六腑脈法論曰診脈之法其要有三一曰人迎在結喉兩傍取之應指而動此部法天也二曰三部謂寸關尺也於腕上側有骨稍高曰高骨先以中指按骨謂之關前指為寸部後指為尺部尺寸以分陰陽陽降陰升通度由關以出入故謂之關此部法人三曰趺陽在足面系鞋之所按之應指而動者是也此部法地三者皆氣之出入要會所以能決吉凶死生凡三處大小遲速相應齊等則為無病之人故曰人迎趺陽三部不參動數發息不滿五十未知生死以三者為決死生之要也故人迎一盛病在太陽謂陽極也四盛以上為隔陽謂無陰以收也寸口一盛病在少陰二盛病在太陰三盛病在厥陰厥有盡也四盛以上為關陰謂無陽以系也隔陽者氣上而不能下則吐逆關陰則閉塞大小便不通皆死不治九候者謂三部之位一位有三候浮取之屬陽沉取之屬陰中得之為胃氣故無胃氣則死五臟之脈輕手於皮膚得之者肺也至肌得之者心也至肉得之者脾也至筋得之者肝也至骨得之者腎也五者輕重皆應是謂五臟之氣全也又有推而外之在經絡推而內之在血脈凡診平人之脈當以平旦陰氣未動陽氣未散飲食未進脈絡調和可以見有餘不足之脈一呼行三寸一吸行三寸呼吸行六寸而脈四至呼吸之間又一至此盛脈得天全者也若過十息脈應五十動又須與氣相應往來緩急得中潤澤如慢水流行源源者此壽脈無疾也若不滿五十動一止此一臟之氣絕四歲死三十動一止三歲死二十動以下一止期以歲月死若與形氣不相應往來短促枯燥無首尾此不壽之脈而多病凡診病脈則不拘晝夜審脈所以察其由則寒熱虛實見矣凡脈病人不病者死人病脈不病者生診諸病證脈法論曰脈變於內病形於外相參以察其理氣熱脈滿是謂重實脈實以堅謂之益甚上下相失不可數者死謂至數也脈口熱而尺反緩皮膚外證也滑則從澀則逆寸口膚熱而尺膚寒是經氣有餘絡氣不足也尺膚熱脈滿寸口膚寒脈澀是經氣不足絡氣有餘也脈寸虛尺虛是謂重虛重虛者死寸虛者病情無常神不守也尺虛者行走恇然脈滑則生澀則死脈急大堅尺澀而不應謂之形滿手足溫則生寒則死乳子中風熱喘鳴肩息脈緩則生急則死下痢白沫脈沉則生浮則死下痢膿血脈懸絕則死滑則生浮澀之脈身有熱者死癲疾之脈博大而滑久久自已脈小堅急死不治病人口甘而渴此數食甘美而多肥五氣之溢也謂之脾癉病人口苦此因數謀慮不決膽虛氣上溢是謂膽癉凡消癉之脈實大病久可治病人身熱如炭頸膺如格人迎躁盛喘息氣逆太陰脈微細如髮者死不治謂氣口與人迎不相應也心脈滿大癇瘛筋變肝脈小急癇痙筋攣肝脈騖暴有所驚駭無故而喑脈不至不治自已謂氣暴厥也氣復則已腎脈小急肝脈小急皆為瘕肝脈並沉為石水並浮為風水並虛為死並小弦為驚腎脈大急沉肝脈大急沉皆為疝肺沉博為肺疝太陽急為瘕膀胱氣也太陰急為脾疝少陰急為癇厥心病也少陽急為驚膽病也脾脈沉鼓為腸癖由飽食而筋脈橫解腸癖為痔胃脈沉鼓澀胃外鼓大心脈小急皆為偏枯年不滿二十者三歲死脈至而搏血衄身熱者死心肝脈小沉澀為腸癖心脈至如喘名曰暴厥不知與人言脈至如數使人暴驚三四日自已肺脈有餘病皮痹閉不通而生癮疹不足病肺痹寒濕脾脈有餘病肉痹寒中陰隔塞也肝脈有餘病筋痹脅滿不利不足病肝痹腎脈有餘病骨痹身重不足病腎痹凡陰病見陽脈者生謂病人四肢厥惡寒多汗脈得洪大數實也陽病見陰脈者死謂病人身熱狂躁譫言欲飲水脈得沉細微遲也辨脈形及變化所主病證法浮脈之狀在皮膚輕手得之重按則似有若無王於秋主肺主風主虛乏短氣秋得之為順春得之為賊邪冬得之為虛邪夏得之為實邪又為微邪其病不治自愈純浮為感風浮弦為虛勞浮緊為風寒浮芤為衄血浮滑為風痰浮洪為風氣壅滯浮微為氣不足浮緩為風虛四肢不隨浮澀為傷肺咯血嗽血浮遲為傷憊浮弱為虛損浮濡為氣血俱不足又看見於何部位以臟腑經絡推之余皆仿此消息沉脈之狀取於肌肉之下得之主臟病沉滯伏匿在寸為心肺鬱伏悲憂不樂在關為肝脾不利中滿善噫䐜脹濕勝則腫滿溏泄食不化支膈胠脅滿善恐在尺則為石水腹腫硬以指彈之殼殼然有聲小便澀沉緊為腸間積寒痛沉澀結為五氣積聚成形沉數或疾為骨蒸沉滑為腎消骨枯善渴小便數純沉為腫重足膝不利不得履地得之於陰濕之氣沉而微五臟氣衰骨痿不能起遲脈之狀往來極遲一息三至為陰盛陽虛之候若手足厥不回者死五臟氣短不能朝於氣口肺腎俱衰也太素脈訣作肺腎俱絕陳無擇三因方云遲者應動極緩與人迎相應則濕寒凝滯與氣口相應則虛冷沉積為寒為痛遲而澀為癥瘕咽酸數脈之狀往來急數一息六至為陽盛陰微之候寸脈見之為熱為躁為煩左關為目赤頭痛煩滿右關為口臭胃煩嘔逆尺中見為小便黃赤大便閉澀與人迎相應為熱與氣口相應或為瘡洪脈之狀大而隱指若大而散漫是謂氣衰大而浮風客於衛咳出青黃膿如彈丸大若不出則傷肺下利得脈大利益甚霍亂得之吉又其脈主夏屬心虛脈之狀浮大無力遲而且柔又如蜘蛛絲此陽氣衰少陰氣獨居為多汗亡陽形氣蕭索其人不壽散脈之狀浮而無力至數不齊渙漫不收更甚於虛或來多去少按之如無此氣血俱虛根本脫離之候左寸軟散為陽虛不斂右寸見之為氣耗汗出肝脈軟散色澤者當病溢飲脾脈得之色不澤當病足胻腫尺脈見散為精氣衰耗又產婦得之生孕婦得之死芤脈之狀如浮而大於指面之下其形中斷又如流水不相續或如瀉漆之形斷而倒收又似弦而軟太素脈訣云芤脈之狀中空弦散主吐血嘔血衄血男子失精婦人胞漏半產血崩又曰其狀弦大弦則為減大則為芤弦芤相搏此名為革金刑木而傷肝也芤而滑嘔吐甚則亡血芤而數陽陷陰中血妄行芤而急風冷入血下血如豚肝臍腹痛死不治芤而弦因失血致勞傷芤而微或散久成血枯濡脈之狀極軟弱如以指按水中綿如有如無太素脈訣云諸部脈形按之極小為陰陽俱不足濕冷霧露之氣所傷為病頭重如以濕熱之物裹首大筋軟短小筋弛長為痿弱骨不能立又為亡津液精神不收十便良方云精神乾急或偏枯血脈痹得之風冷濕氣也余同前又為脛酸枯細手足常厥冷肉理不密微脈之狀極微或似有似無為氣血不足為虛憊亡血亡汗小便數或白濁若微數為陰虛客陽內熱穀氣少也若在尺部腎脂枯髓不滿骨若在左關則肝虛血不足目視𥉂𥉂筋緩弱若在右關則虛滑泄注穀不化腸鳴及漿粥不入胃若在右寸則為肺損背寒口中如含霜雪咳嗽肌疏不可以風短氣若在左寸為心虛恍惚憂思不樂多恐如人將捕之若六部俱微則陽不及四肢足脛冷手足厥常欲湯火暖之陳無擇三因方云微者極細而軟似有若無與人迎相應則風暑自汗與氣口相應則微陽脫泄入里病脈微為虛為弱為衄為嘔為泄為亡汗為拘急微弱為少氣為中寒革脈之狀渾渾革至如湧泉謂出而不返也為陰氣隔陽又為溢脈蓋自尺而出上於魚際亦謂之離經無根本也又覆脈之狀自寸口下退過而入尺皆必死之脈也伏脈之狀重於沉指下尋之方得蓋時見時隱也太素脈訣云伏脈之狀其形沉伏隱隱其位此陰陽之氣相伏也或陰中伏陽陽中伏陰脈疾為伏陽內熱身雖寒而不欲蓋衣脈遲小有來無去此伏陰在內陽氣不得入也其人身雖熱而但欲覆被向火脈實者有伏氣在內澀者有動氣在左則左病在右則右病在臍則居臍上下居臍上為逆居臍下為從牢脈之狀如弦而實尋之則散太素脈訣云指下尋之不動為五勞六極七傷之病若加數疾則發熱加短遲則發寒疾遲不常則寒熱肢體迫急情思不樂實脈之狀舉按有力重按隱指愊愊然氣不利亦主伏陽在內蒸熱勞倦胃氣壅塞為內癰實數為三焦閉熱大便秘實滑為癖飲癥瘕留聚之病實大為氣盛閉塞太素脈訣實大作實洪實沉為臟腑氣不通帶短太素脈訣云實而短為宿穀不化弱脈之狀小而無力為精不足短氣表裡俱衰為暴下陰並於陽汗出不止者死又為腳弱筋緩足不能履地惡寒不可出風細脈之狀細細似線太素脈訣云其形細微陰氣勝陽也又為手足寒氣少慘慘不舒暢又血不榮於四肢謂寒則澀而不流行也太素脈訣云又主冷泄痢緩脈之狀不遲不疾一息四至往來得中實得土氣太素脈訣云緩脈之狀如柳葉也緩甚為病四肢不收受濕而痹緩而沉脾氣滯志意不舒展氣痞多噎緩而澀肌肉不仁津液不流行榮衛失度因以致風緩而微為消氣緩而滑為熱中多食緩而短穀不化為溏泄緩而浮為風嚲曳陳無擇三因方云緩者浮大而軟去來微遲與人迎相應則風熱入臟與氣口相應則怒急傷筋緩而在下為風為寒為弱為痹為疼為不仁為氣不足為眩暈緩而滑為熱中緩而遲虛寒相搏食冷則咽痛澀脈之狀往來極澀如水不能流或聚於指下或綿綿如瀉漆斷而倒收又似止非止太素脈訣云澀脈之狀如刀口到指不離其所主男子亡血失精婦人胎妊不成月候凝澀或崩傷不止五帶敗血在腹或血瘕成形筋急寒痹浮澀為肺病咯血咳嗽虛勞澀中時弦為金木相剋脅下痛不得臥者死在左寸為心痹寒慄病積溲血在左尺為病小腹積氣在右關則病心腹時滿在左關則病筋急積寒結脈之狀大小不定往來不拘數至時一止主氣不流行腹中症癖氣塊成形或因大病後亡津液亡血或驚恐神散而精不收或夢漏亡精又多慮而心氣耗也若無是因則其人壽不過一二年代脈之狀其來如斷絕而相待其息以至時搏而動主血氣虧損或驚憂積甚形氣不相得也滑脈之狀指下如水之流或如轉珠而滯礙太素脈訣云不緩不洪不實如珠之形主嘔吐主飲滑而弦細者為支飲咳逆倚息面浮腫滑而緊停寒積飲吞酸腸間漉漉有聲滑而弦留飲在胃頭痛而眩滑而數為中暍甚則為痓手足瘛瘲搐搦也滑而緩熱中消穀引食滑而細沉為消渴帶微為消中不渴小便數滑實為氣盛上熱滑大而數為心氣熱越多汗滑而微小為多盜汗在尺滑為狐風疝在右寸口為肺風疝在右關則為脾風疝在左關則為肝風疝緊脈之狀如按繩繳指三部通度與弦相似而有力舉按皆有餘主中寒腹痛切急在寸口則中寒口噤頭痛惡寒欲得覆被火炙在關上則胃冷吞酸中脘臍腹痛下利筋寒或轉筋霍亂咳嘔膽汁緊數為冷熱痢下膿血或身熱飲食如故有痛處則結癰疽在尺為寒疝痛促脈之狀自尺上寸口促急有來無去太素脈訣作有來時止復來此榮衛無度數陰氣促陽也又腎氣離經升而不降又為無陰而陽無以系也若時氣促數上出寸口此陽並於血病赤斑十死一生若脈見斷絕為黑斑獨陽攻臟氣絕死不治動脈之狀鼓動而暴於指下不常氣血相乘搏擊而動也或鼓於陽則一陽為鉤如夏脈之盛或鼓於陰一陰為毛如秋氣之急切勁烈鼓陽勝而急曰弦陰緩而陽急也鼓陽至而絕曰石陽闢而陰孤也陰陽相過曰溜氣相鼓作而動也弦脈之狀如張弓弩弦應指有力重按則軟弱太素脈訣云狀如琴絃主春氣主肝臟主虛主痰主瘧主勞弦而微氣不足筋緩不榮弦急似數非數綿綿之狀勞傷氣促急四肢煎厥無首尾而促疾虛勞不足弦弱而疾夜多盜汗弦短而大榮衛勞傷內急外緩兼數則熱目視𥉂𥉂血不足也兼遲則寒筋脈急攣弦澀因失血女子則月閉血瘕弦緊為虛寒裡急寒疝少腹痛面青下利弦遲而澀出入無首尾為寒閉血少筋乾急太素脈訣作弦而急或偏枯血脈痹得之風冷濕也十便良方云沉而微五臟氣衰骨痿不能起短脈之狀往來極短不待息盡而回或無首尾但見於指面亦不待氣來而至其人短氣息或不能長息又為大下脫氣又主久病長脈之狀往來指下息隨而盡其有餘如操帶物之長太素脈訣云長脈之狀往來至長稟賦氣強勝血而氣擁其人壽若加大而數為病陽盛內熱當利三焦
