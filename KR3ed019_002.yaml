body:
  text: 卷二寒證論曰若其人灑淅惡寒但欲厚衣近光隱隱頭重時痛鼻窒塞濁涕如膿咳嗽動輒汗出或無汗甚則戰慄此由寒中於外或由飲冷傷肺胃內外合邪留而不去謂之感寒寒從外至者兩手寸口脈俱緊或但見於右寸寒從內起者其脈遲小無汗者小青龍湯主之小汗者溫肺湯主之小青龍湯五味子細辛去苗乾薑半夏湯洗七遍甘草炙各一兩上為散每服五錢水二大盞姜三片棗一個擘破同煎至八分去滓溫服溫肺湯方缺若陰寒積冷心腹大痛嘔逆噁心手足厥冷心胸不快腰背疼痛良薑湯主之良薑湯高良薑一兩銼碎炒官桂一兩去皮當歸去蘆一兩銼炒白茯苓一兩附子半兩炮上為散每服二大錢水一盞半入生薑五片煎至七分去滓空心服若但寒頭重動眩暈肌肉痛牽急不得轉側漐漐汗出惡寒小便難大便反快短氣足寒或時咽痛微熱此由寒濕客搏經脈不得發泄其脈遲緩而小弦附子湯主之除濕湯亦主之附子湯附子一個炮去皮臍白朮一兩炒茯苓白芍各三兩人參二兩上為散每服二大錢水一盞半入生薑三片煎至七分去滓空心服除濕湯方缺熱證論曰陰不足則陽偏陽偏則發熱若熱從背起自手足漸漸周身口舌乾燥欲飲水而不能此由陰氣虧少少水不能制盛火諸陽起於四末循行於背陰不能斂陽陽氣獨行所以發熱或晝發而夜寧或夜發而至旦即消其脈虛疾而小芍藥黃耆湯主之芍藥黃耆湯芍藥三錢黃耆甘草炙青蒿陰乾各一兩上為散每服五錢水二大盞煎至一盞去滓食後溫服若熱從腹起上循胸腋繞頸額初微而漸至大熱發無時遇飢則劇中脘不利善食而瘦其色蒼黃肌肉不澤口唇乾燥由脾氣素弱曾因他病誤服熱藥入於脾脾熱則消穀引飲善消肌肉其脈濡弱而疾參橘丸主之若嗽者用加減法及灸脾腧百壯參橘丸橘皮三兩洗麥門冬去心人參去蘆各一兩上為末煉蜜為丸如梧桐子大食前米飲下三十丸若嗽加五味子一兩若熱從腹中或從背起漸漸蒸熱日間劇夜漸退或寐而汗出小便或赤或白而濁甚則頻數尿精夜夢鬼交日漸羸瘦由思慮太過心氣耗弱陽氣流散精神不藏陰無所使治屬虛勞大建中湯主之大建中湯芍藥六兩黃耆遠志去心當歸洗澤瀉各三兩龍骨人參甘草炙各二兩上為散每服五錢水二盞棗二個擘破姜五片同煎至一盞去滓食後溫服腹中急加餳如棗大若自腰以上發熱熱及則汗出出已而涼移時如故復加昏暈腹中膨脝其氣上攻時時咳嗽嗽引脅下牽痛睡則驚悸其脈弦急疾由外寒客搏內冷相合寒則氣收而水液聚內化成飲醫以熱藥攻寒寒閉於內熱增於上陽氣不下行故散越於上發而為熱散而為汗汗多亡陽心氣內虛故令驚惕治屬飲家以旋覆花丸主之旋覆花丸旋覆花桂心枳實麩炒人參各五分乾薑芍藥白朮各六分茯苓狼毒烏頭炮去皮礬石火煅一伏時各八分甘遂三分炒細辛去苗大黃濕紙裹煨黃芩葶藶炒芫花炒橘皮洗吳茱萸炒厚朴去皮薑汁炙各四兩上為細末煉蜜為丸如梧桐子大米飲下三丸未效加至七丸小兒黃米大二丸若熱起骨間煩疼手足時冷早起體涼日晚即熱背膂牽急或骨節起凸足脛酸弱由陰不足而陽陷陰中熱留骨髓髓得熱則稀髓稀則骨中空虛陰虛水少脂枯故蒸起其脈沉細而疾治屬骨蒸補髓丸主之補髓丸生乾地黃曬乾三兩乾漆半兩碎炒令煙盡上為末煉蜜為丸如梧桐子大飲下三十丸空心臨臥服若自胸以上至頭髮熱口鼻氣色時如煙燻目澀咽燥唾如凝脂時咳毛竦大便不利小便赤由肺不調邪熱熏上焦其脈疾大先服桔梗湯熱不退者五味子湯主之桔梗湯桔梗一兩人參麥門冬去心甘草炙各半兩小麥一合上㕮咀水三升煎至一升去滓分三服五味子湯指南方治發熱甚不退柴胡去苗洗四兩半夏湯洗七遍一兩一分黃芩五味子赤茯苓分兩原缺上為散每服五錢水二盞姜五片棗二個擘破同煎至一盞去滓溫服若但熱不歇日晡尤甚口中勃勃氣出耳無所聞晝多昏睡睡即浪言喜冷小便赤澀大便不通由三陽氣盛蘊於經絡內屬腑臟或因他病而致疾其脈短疾而數柴胡芒硝湯主之柴胡芒硝湯柴胡四兩洗去苗黃芩甘草炙赤茯苓各一兩半半夏湯洗七遍一兩一分上為散每服五錢水二盞生薑五片棗二個擘破同煎至一盞去滓入芒硝一錢攪和溫服以大便利為度若身大熱背微惡寒心中煩悶時時欲嘔渴不能飲頭昏重痛惡見日光遇涼稍清起居如故由飲食失時胃中無穀氣熱蓄於胃中中脘熱則三陽不下降而上聚於腦又胃主陽明經為惡熱其脈虛大而數久則細小謂之中暑初即服好茶一杯立愈不即治之留而在胃別緻他病生薑竹茹湯主之生薑竹茹湯竹茹雞子大人參半兩葛根半兩生薑一錢切上為散水三盞煎二盞去滓分二服不拘時若間日發熱發必數欠頭痛拘倦由肺素有熱氣盛於身厥逆上衝中氣實而不外泄其氣內臟於心外舍於分肉之間令人消爍脫肉其脈弦大而數謂之癉瘧柴胡栝蔞湯主之柴胡栝蔞湯柴胡去苗洗八錢芍藥人參各二錢半夏湯洗七遍二錢半甘草炙二錢栝蔞二錢上㕮咀水二升生薑十片棗二個擘破同煎至一升分三服去滓服大熱者去芍藥栝蔞用黃芩三錢即名小柴胡湯若身熱汗出煩滿不為汗解由太陽之經先受風邪與熱相搏腎氣厥則煩滿謂之風厥澤瀉湯主之澤瀉湯澤瀉半兩白朮防風各二兩石膏研赤茯苓各一兩上為散每服五錢水二盞煎至一盞去滓溫服若四肢發熱逢風如炙如火由陰不勝陽陽盛則熱起於四肢少水不能滅盛火而陽獨治於外以菟絲子丸主之菟絲子丸菟絲子先於臼內杵百下篩去雜物末五味子各一兩生乾地黃一兩上為末煉蜜和丸如梧桐子大飲下三十粒食前服若發熱耳暴聾頰腫脅痛胻不可以運由少陽之氣厥而熱留其經宜小柴胡湯若口乾溺赤腹滿心痛由熱留於手少陰之經其氣厥也赤茯苓湯主之赤茯苓湯赤茯苓四兩甘草生一兩木香半兩上為散每服五錢水二盞煎至一盞去滓溫服風食論曰若其人翕翕如熱淅淅如寒無有時度支節如解手足痠痛頭目昏暈此由榮衛虛弱外為風邪相乘搏於陽則發熱搏於陰則發寒久不治成勞氣荊芥散主之荊芥散荊芥穗人參白朮當歸切細焙黃耆芍藥桂去皮各一兩柴胡去苗二兩甘草炙半兩上為末每服五錢水二盞煎至一盞去滓溫服若忽然牙關緊急手足瘛瘲目直視此風客血經謂之風痓脈緊大者不可治獨活湯主之獨活湯獨活半兩銼荊芥穗一兩上以水三盞煎荊芥汁至一大盞再入獨活煎一半去滓溫服凡用獨活紫色有成臼子者蓋羌活極大而老者是尋常所用白色者乃老宿前胡也慎不可用又方煎荊芥濃汁於盆中坐病人於上熏蒸然後淋洗之若寒熱如瘧不以時度腸滿膨脝起則頭暈大便不通或時腹痛胸膈痞悶此由宿谷停留不化結於腸間氣道不舒陰陽交亂備急丸主之備急丸大黃濕紙裹煨巴豆去皮心及油乾薑去皮等分上為細末煉蜜為丸如豌豆大每服一丸米飲下羸人服一丸如綠豆大以便快利為度風濕論曰若身體疼心煩口燥欲得水而不能飲額上微汗背強欲得覆被向火其脈浮虛或日晡發熱或身重汗出而脈但浮或掣痛不得屈伸近之則痛極短氣或身微腫或發熱面黃而喘鼻塞而煩脈大自能飲食此由汗出當風或因冒濕冷復遇風邪之氣閉固腠理病名風濕麻黃加朮湯主之日晡發熱者薏苡仁湯主之掣痛不得屈伸者甘草附子湯主之鼻窒塞氣不通者瓜蒂散主之惡風身體重者防己湯主之麻黃加朮湯麻黃去根節三兩桂心二兩甘草炙一兩杏仁湯洗去皮尖半兩白朮四兩上為散每服五錢水二盞煎至一盞去滓溫服薏苡仁湯麻黃去根節三兩杏仁去皮尖半兩甘草炙薏苡仁各一兩上為散每服五錢水二盞煎至一盞去滓溫服甘草附子湯甘草炙二兩附子炮去皮臍一兩上為散每服五錢水二盞煎至一盞去滓溫服瓜蒂散瓜蒂細辛去苗藜蘆去苗各等分上為細末每用半字許內鼻中以氣通為度防己湯防己四兩黃耆四兩甘草炙二兩蒼朮去皮三兩上為散每服五錢水二盞姜二片棗一個擘破同煎至一盞去滓溫服瘧疾論曰寒熱之病或寒已而熱或熱已而寒或寒熱戰慄頭痛如破身體拘急數欠渴欲飲冷或晬時而發或間日而作至期便發發已即如常此謂之瘧瘧脈自弦弦數多熱弦遲多寒此皆得之於冬中風寒之氣藏於骨髓之中至春陽氣大發邪氣不能自出因遇大暑而後與邪氣相合而發常山湯主之常山湯常山知母甘草炙各三兩麻黃去節一兩上為散每服五錢水二盞煎至一盞去滓溫服以糜粥一杯助取汗為度熱多者宜解之栝蔞湯主之栝蔞湯栝蔞根四兩柴胡去苗八兩人參黃芩甘草炙各三兩上為末每服二錢水二盞生薑三片棗一個擘開煎至一盞去滓溫服寒多者宜溫之薑桂湯主之薑桂湯乾薑牡蠣火煅通赤甘草炙各二兩黃芩二兩活人書用三兩柴胡去苗八兩栝蔞根四兩桂去皮取心三兩上為末每服五錢水二盞煎至一盞去滓溫服不拘時候寒熱等者宜調之鱉甲湯主之鱉甲湯鱉甲湯浸刮令淨醋炙白朮常山桂去皮柴胡去苗各一兩牡蠣半兩火煅赤上為散每服五錢水二盞煎至一盞去滓溫服痹證論曰若始覺肌肉不仁久而變生他證病名曰痹此由風寒濕三氣客於經絡舍於血脈搏於榮衛故令皮膚痹而不仁有熱則肌肉骨節煩疼有寒則冷以春得之在筋夏得之在脈秋得之在皮冬得之在骨四季得之在肌肉又久而不去各傳其臟筋痹不已舍之於肝夜臥則驚飲食多小便數上為引如懷妊脈痹不已舍之於心其脈不通煩滿心下鼓暴上氣肌痹不已舍之於脾其狀四肢懈惰發咳嘔汁上為大塞皮痹不已舍之於肺其狀煩滿而喘嘔骨痹不已舍之於腎其狀善脹尻以代踵脊以代頭上證雖多必先肌肉不仁其始治當以增損小續命湯證狀小不同者當依本法病久入深魯公酒主之增損小續命湯方缺魯公酒茵芋川烏頭炮去皮臍躑躅花天雄炮去皮臍防己石斛去根各一兩細辛去苗柏子仁牛膝去苗甘草炙通草桂去皮取心山茱萸秦艽去苗土黃芩茵陳蒿瞿麥附子炮去皮杜仲去皮澤瀉王不留行石楠葉防風生乾地黃各半兩遠志去心右㕮咀酒四斗漬十日每服一合常令酒氣相續若胃干而渴肌肉不仁由居處卑濕以水為事肌肉濡漬痹而不仁是謂肉痿罌粟湯主之罌粟湯罌粟不計多少上研細末煮稀粥入蜜飲之大解金石毒若一邊足膝無力漸漸瘦細肌肉不澤上牽脅肋下連筋急不能行步此由大病之後數亡津液血少不榮氣弱不運肝氣虧損無血以養筋筋不榮則乾急而痛亦不能舉活血丹主之活血丹乾地黃二兩當歸洗芍藥續斷白朮各一兩上為細末酒糊為丸如梧桐子大溫酒下三十丸食前服加至五十丸如痛甚足痿不能行去朮加杜仲一兩乳香葳靈仙木鱉子仁草烏頭白芥子各半兩鹿茸丸鹿茸去毛切作片子酥炙五兩乾地黃二兩菟絲子揀淨酒浸透乘潤搗爛焙二兩杜仲去粗皮搗爛酒拌炒乾二兩牛膝二兩萆薢二兩附子炮去皮臍半兩乾漆半兩炒煙盡為度上為細末酒糊為丸如梧桐子大飲下三十丸食前服若時覺腳弱速灸風市三里二穴各一二百壯若覺熱悶慎不可灸大忌酒面房勞風市穴使病人平立垂兩手合手著腿中指尖頭即是穴三里穴在足膝蓋下三寸外廉按之陷中是又法以指深按之則足趺陽脈不見為準勞傷論曰古書有五勞六極七傷皆由勞傷過度或五臟六腑互相剋賊一臟偏損五行逆伏以致盡絕皆謂之虛勞也若日頓羸瘦短氣腰背牽急膝脛酸痿小便或赤或白而濁夜夢紛紜或夢鬼交翕翕如熱骨肉煩疼由房勞過度或思慮過多皆傷神耗精之由得之心腎其脈細促大骨枯者不治微弱者可治脈大數甚不能食者死大建中湯主之大建中湯見前發熱門氣病論曰百病皆生於氣其始必由喜怒悲憂驚恐由是變生形證不一若其氣起於一邊或左或右循行上下或在肌肉之間如錐刀所刺其氣不得息令人腹中滿由驚恐恚怒或冒寒熱留而不去為鬱伏之氣因氣流行隨經上下相搏痛久久令人痞悶其脈短澀謂之聚氣七氣湯趁痛散主之七氣湯楊仁齋直指方云治七情相干陰陽升降氣道壅滯攻衝作疼京三稜蓬莪朮青橘皮香附子去毛陳橘皮洗桔梗藿香葉桂取心益智各一兩半甘草炙三錢胡氏經效方有沉香半兩無陳橘皮上為散每服五錢水二盞生薑二片棗二枚煎至一盞食前溫服趁痛散可用方云治氣搏作痛肌肉之間如錐刀所刺胸膈痞悶蓬莪朮炮桂心各一兩檳榔附子炮去皮臍細辛去苗各半兩芫花炒別為末一錢上除芫花外共為末每服三大錢水一盞煎至七分去滓調芫花末一字溫服若心下似硬按之即無常覺膨脹多食則吐氣引前後噫氣不除由思慮過多氣不以時而行則氣結又曰思則心有所存神有所歸正氣留而不行其脈澀滯謂之結氣參橘丸主之參橘丸橘皮四兩洗人參一兩上為細末煉蜜和丸如梧桐子大米飲下三十丸食前服若咽中如核咽之不下吐之不出久不治之漸妨於食或由思慮不常氣結不散或因飲食之間氣道卒阻因而留滯因氣者謂之氣噎其脈緩澀因食者謂之食噎其脈短澀氣噎嘉禾散主之食噎神麯丸主之嘉禾散方缺神麯丸神麯炒一兩橘皮洗二兩上為細末煉蜜和為丸如雞豆大每服一粒含化咽津若痛而遊走上下無常處脈亦聚散或促或澀謂之遊氣術香散主之不止者延胡散主之術香散蓬莪朮炮一兩人參一分木香一錢上為細末醋湯調方寸匕延胡散延胡索炒當歸洗等分上為細末醋湯調方寸匕若自咽嗌以下至臍左右氣各不相通氣上奔急攻右臂痛如斧槌肌肉日消漿粥不下心中懊悶由肺經本受寒邪留於右邊以肺在右或因以大熱藥攻寒寒本在於經而不能散發於是火氣但逼於肺肺燥則氣上迫但解藥毒然後理肺先宜炙肝散後宜理氣湯炙肝散牡丹皮柴胡芍藥各一兩白朮二兩上為細末用豬肝三指許薄批摻藥末二錢慢火炙熟細嚼米飲下食前服理氣湯疑即前七氣湯柏子仁丸史載之指南方多楮實一兩治臂痛不能屈伸筋脈攣拘柏子仁炒研乾地黃各二兩茯苓枳實麩炒去瓤桂取心五味子附子炮去皮臍石斛去苗鹿茸去毛截作片子酥炙酸棗仁覆盆子沉香黃耆各一兩上為細末煉蜜和丸如梧桐子大酒下三十丸空心服若腹脅有塊大小成形按之不動推之不移久久令人寒熱如瘧咳嗽面目浮腫動輒微喘日就羸瘦由暴怒或驚恐氣上而不下動傷於肝氣結聚成形始得之在肝其脈牢大而結不傳可治沉香煎主之沉香煎石斛五兩椒去目炒出汗附子炮去皮臍秦艽去土鱉甲煮刮去筋膜炙柴胡去苗沉香木香檳榔黃耆各二兩上為末先用枸杞根新者十斤淨洗槌碎好酒二斗煮至七升取出枸杞別用好酒三升拍洗令淨漉去滓濾過並於前煎酒內更入熟蜜四兩再熬成膏和藥末丸如梧桐子大飲下二十丸食前服血證論曰諸陽統氣諸陰主血陰盛則陽虧而陽病陽盛則陰虧而陰病陽氣侵陰血失常道故或吐或衄或從口或從鼻若暴出而色鮮心煩燥悶時欲引飲出自三斗陽入於陰也血得熱則流散譬如天地之經水天暑地熱則經水沸溢而壟起故有內衄肺疽其證大同而小異其脈洪數者為逆微小者為順宜梔子柏皮湯煎金湯大熱者宜地黃煎若吐血時先聞腥臊臭出清液胸脅支滿妨於食目眩時時前後血此由素經大奪血或醉入房中氣竭傷肝女子則月事衰少不來病名血枯梔子柏皮湯主之梔子柏皮湯黃柏梔子各一兩甘草半兩上為散每服五錢水二盞煎至一盞去滓溫服煎金湯金花並莖葉陰乾不拘多少上濃煮汁頓服立定地黃煎生地黃汁半斤大黃末一兩上將地黃汁熬耗一半內大黃末同熬候可丸如梧桐子大熟水下五粒未效加至十粒若吐血服湯後轉加悶亂煩躁紛紛欲嘔顛倒不安由胸上有留血其脈沉伏急須吐之人參散主之人參散人參蘆上為末水調下一二錢若血隨嘔出胸中痞悶嘔畢則目睛痛而氣急由怒氣傷肝膽血隨嘔出竹皮湯主之竹皮湯青竹皮甘草炙芎藭黃芩當歸洗各六分芍藥白朮人參桂心各一兩上為散每服五錢水二盞煎至一盞去滓溫服若先吐血血止後嗽嗽中血出如線痛引脅下日漸羸瘦由悲憂傷肺肺主諸氣血常隨之氣傷則血無以運故橫流而暴出後隨病而上下也其脈緩小者可治細數加急者不可治黃耆湯主之黃耆湯黃耆蜜炙一兩白朮炒二兩人參甘草炙各一兩白芍一兩陳皮半兩藿香半兩上為散每服四錢水一盞半煎至七分去滓溫服若衄血吐血發作無時肌肉減少由氣虛弱或從高墮下勞傷所致其脈虛弱當補陰平陽阿膠散主之阿膠散阿膠蛤粉拌炒一兩半杏仁炮去皮尖七錢馬兜鈴焙牛蒡子炒各一兩甘草炙糯米一兩上為細末熟水調下一二錢若吐血腹中絞痛汗自出胸中悶由飲食傷胃胃氣不轉氣上衝胸所食之物與氣迫蹙因胃裂白朮湯主之白朮湯方缺
