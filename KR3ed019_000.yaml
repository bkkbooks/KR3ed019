body:
  text: 原序余昔任左史遇疾瀕死考城王貺子亨為察衆工之用藥而余以生因以其所著全生方一編遺豫藏之未暇讀也繼掌外製一日得異疾謀諸醫未決子亨笑曰毋恐此我書所有也視某章病當某藥如方信宿而疾良已於是奇之歸居淮南去王城國偶有病只訊於書謫三巴遷百粵去醫益遠又槖本以歸餘余以為之表其端曰此書直而邃曲而通部居彪列而脈絡潛流形色昭彰而對治要妙知方者讀之智思橫生不知者猶可按圖而愈疾真衛生之奇寶濟物之良術也至理不煩至語不費余非知道者而於此乎取之子亨當官不苟遇世變嘗慨然再請出疆萬里其論著此書用心救世利物不特此矣吳敏序自序德彌大者常存乎好生之心志彌廣者每切於立言為教在上世則有伊尹逮後漢乃見張機祖述神農之經發明黃帝之道雖然術至通神之妙在乎知慮以為先藥至起生之功必因精而能後效天無棄物非人莫知所能人有常心非道莫知所適凝神自悟觸理皆分故能贊益天機悉體陰陽之變深窮造化博極生死之源候色驗形自契一時之理刳腸剖臆難傳後代之精至於湯液除疴砭石起死必當研窮性味斟酌淺深治理在於君臣協攻資乎佐使方書之行其來尚矣有人猶不能刻意研求專心致志攖邪抱病則束手無能制療處方則委身紕繆余竊悲之於是採古人之緒餘分病證之門類別其疑似定其指歸陰陽既明虛實可考若能按圖求治足以解惑指迷雖未起死回生庶幾扶危拯困故號曰全生指迷以崇大倫之道焉考城王貺子亨序
